
version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "08:00"
      timezone: "Europe/Vienna"

    open-pull-requests-limit: 5

    labels:
      - "dependencies"

    commit-message:
      prefix: "deps"

    groups:
      express-tooling:
        patterns:
          - "express"
          - "express-*"
          - "helmet"
          - "morgan"
          - "method-override"
          - "express-session"
      auth:
        patterns:
          - "passport"
          - "passport-*"
      database:
        patterns:
          - "mongoose"
          - "connect-mongo"
          - "connect-mongodb-session"
          - "mongodb*"
      templating:
        patterns:
          - "ejs"
          - "ejs-mate"
      uploads-and-media:
        patterns:
          - "multer"
          - "cloudinary"
          - "@mapbox/*"
      general:
        patterns:
          - "*"
```
